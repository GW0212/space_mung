    const mobileScale = isMobileViewport() ? 0.72 : 1;
    const r = rand(34, 82) * depth * mobileScale;
    return {
      depth,
      x: rand(-W*0.06, W*1.06),
      y: y0 ?? rand(-120, H+120),
      vx: rand(-0.12,0.12) * (2 - depth),
      vy: rand(-0.25,-0.06) * (1.1 / Math.max(depth, 0.65)),
      r,
      hue: rand(178, 208),
      sat: rand(78, 100),
      pulse: rand(0.45, 1.15),
      phase: rand(0, Math.PI * 2),
      tentacles: randInt(7, 15),
      oralArms: randInt(3, 7),
      bellTilt: rand(-0.12, 0.12),
      drift: rand(0.2, 0.7),
      tentacleLens: Array.from({length: 15}, () => rand(1.3, 2.35)),
      oralArmLens: Array.from({length: 7}, () => rand(0.95, 1.45))
    };
  }

  drawPlankton(set, t, near = false) {
    set.forEach(p => {
      const pulse = 0.6 + 0.4 * Math.sin(t * (near ? 2.3 : 1.7) + p.phase);
      const radius = p.r * (near ? 1.05 : 1);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 7);
      g.addColorStop(0, `hsla(${p.hue},100%,78%,${p.a * pulse})`);
      g.addColorStop(0.45, `hsla(${p.hue},100%,68%,${p.a * pulse * 0.45})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius * 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `hsla(${p.hue},100%,85%,${p.a * pulse * (near ? 0.9 : 0.7)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();

      p.x += p.vx + Math.sin(t * 0.25 + p.phase) * (near ? 0.22 : 0.08);
      p.y += p.vy + Math.cos(t * 0.18 + p.phase) * 0.02;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
    });
  }

  drawJelly(j, t) {
    const pulse = 0.5 + 0.5 * Math.sin(t * j.pulse + j.phase);
    const bellW = j.r * (1.02 + pulse * 0.08);
    const bellH = j.r * (0.68 + pulse * 0.12);
    const bellBaseY = bellH * 0.08;
    const alphaMul = clamp(0.28 + j.depth * 0.42, 0.3, 0.82);

    ctx.save();
    ctx.translate(j.x, j.y);
    ctx.rotate(j.bellTilt + Math.sin(t * 0.15 + j.phase) * 0.02);

    const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, j.r * 3.2);
    halo.addColorStop(0, `hsla(${j.hue},100%,72%,${0.12 * alphaMul})`);
    halo.addColorStop(0.5, `hsla(${j.hue},100%,66%,${0.055 * alphaMul})`);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(0, 0, j.r * 3.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let n = 0; n < 3; n++) {
      const glow = ctx.createLinearGradient(0, 0, 0, j.r * (1.7 + n * 0.25));
      glow.addColorStop(0, `hsla(${j.hue},100%,80%,${0.04 * alphaMul})`);
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.strokeStyle = glow;
      ctx.lineWidth = j.r * (0.55 - n * 0.12);
      ctx.beginPath();
      ctx.moveTo(0, bellBaseY);
      ctx.bezierCurveTo(0, j.r * 0.55, Math.sin(t + j.phase) * 6, j.r * 0.95, 0, j.r * (1.5 + n * 0.18));
      ctx.stroke();
    }
    ctx.restore();

    ctx.beginPath();
    ctx.moveTo(-bellW, bellBaseY * 0.2);
    ctx.bezierCurveTo(-bellW * 0.86, -bellH * 0.98, bellW * 0.86, -bellH * 0.98, bellW, bellBaseY * 0.2);
    ctx.quadraticCurveTo(bellW * 0.72, bellH * 0.24, bellW * 0.42, bellH * 0.34);
    ctx.quadraticCurveTo(0, bellH * 0.5, -bellW * 0.42, bellH * 0.34);
    ctx.quadraticCurveTo(-bellW * 0.72, bellH * 0.24, -bellW, bellBaseY * 0.2);
    ctx.closePath();

    const bellGrad = ctx.createRadialGradient(-bellW * 0.16, -bellH * 0.6, 0, 0, 0, bellW * 1.25);
    bellGrad.addColorStop(0, `hsla(${j.hue},100%,92%,${0.30 * alphaMul})`);
    bellGrad.addColorStop(0.3, `hsla(${j.hue},95%,75%,${0.20 * alphaMul})`);
    bellGrad.addColorStop(0.68, `hsla(${j.hue},95%,58%,${0.10 * alphaMul})`);
    bellGrad.addColorStop(1, `hsla(${j.hue},90%,45%,${0.02 * alphaMul})`);
    ctx.fillStyle = bellGrad;
    ctx.fill();

    ctx.strokeStyle = `hsla(${j.hue},100%,88%,${0.18 * alphaMul})`;
    ctx.lineWidth = Math.max(1, j.r * 0.03);
    ctx.stroke();

    const innerGrad = ctx.createRadialGradient(0, -bellH * 0.55, 0, 0, 0, bellW * 0.72);
    innerGrad.addColorStop(0, `rgba(255,255,255,${0.12 * alphaMul})`);
    innerGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = innerGrad;
    ctx.beginPath();
    ctx.ellipse(0, -bellH * 0.15, bellW * 0.72, bellH * 0.55, 0, Math.PI, Math.PI * 2);
    ctx.fill();

    for (let k = 0; k < 7; k++) {
      const x = lerp(-bellW * 0.72, bellW * 0.72, k / 6);
      ctx.strokeStyle = `hsla(${j.hue},100%,85%,${0.11 * alphaMul})`;
      ctx.lineWidth = Math.max(0.8, j.r * 0.015);
      ctx.beginPath();
      ctx.moveTo(x * 0.65, -bellH * 0.72);
      ctx.quadraticCurveTo(x * 0.82, -bellH * 0.18, x * 0.48, bellH * 0.18);
      ctx.stroke();
    }

    for (let a = 0; a < j.oralArms; a++) {
      const baseX = lerp(-bellW * 0.22, bellW * 0.22, a / Math.max(1, j.oralArms - 1));
      const len = j.r * j.oralArmLens[a];
      ctx.beginPath();
      ctx.moveTo(baseX, bellH * 0.24);
      for (let s = 1; s <= 8; s++) {
        const tt = s / 8;
        const px = baseX + Math.sin(t * (0.6 + a * 0.03) + j.phase + tt * 3.5) * j.r * 0.08 * (1 + tt);
        const py = bellH * 0.24 + len * tt;
        ctx.lineTo(px, py);
      }
      const armGrad = ctx.createLinearGradient(baseX, bellH * 0.24, baseX, bellH * 0.24 + len);
      armGrad.addColorStop(0, `hsla(${j.hue},100%,82%,${0.18 * alphaMul})`);
      armGrad.addColorStop(1, `hsla(${j.hue},100%,68%,0)`);
      ctx.strokeStyle = armGrad;
      ctx.lineWidth = Math.max(1.2, j.r * 0.034);
      ctx.stroke();
    }

    for (let k = 0; k < j.tentacles; k++) {
      const baseX = lerp(-bellW * 0.82, bellW * 0.82, k / Math.max(1, j.tentacles - 1));
      const len = j.r * j.tentacleLens[k];
      ctx.beginPath();
      ctx.moveTo(baseX, bellH * 0.16);
      for (let s = 1; s <= 11; s++) {
        const tt = s / 11;
        const sway = Math.sin(t * (0.7 + k * 0.02) + j.phase + tt * 5.2) * (j.r * 0.07 + tt * j.r * 0.08);
        const px = baseX + sway;
        const py = bellH * 0.16 + len * tt;
        ctx.lineTo(px, py);
      }
      const tentacleGrad = ctx.createLinearGradient(baseX, bellH * 0.16, baseX, bellH * 0.16 + len);
      tentacleGrad.addColorStop(0, `hsla(${j.hue},100%,88%,${0.22 * alphaMul})`);
      tentacleGrad.addColorStop(0.5, `hsla(${j.hue},100%,72%,${0.1 * alphaMul})`);
      tentacleGrad.addColorStop(1, `hsla(${j.hue},100%,70%,0)`);
      ctx.strokeStyle = tentacleGrad;
      ctx.lineWidth = Math.max(0.9, j.r * 0.017 * (1.35 - j.depth * 0.18));
      ctx.stroke();

      if (k % 3 === 0) {
        ctx.strokeStyle = `hsla(${j.hue},100%,92%,${0.05 * alphaMul})`;
        ctx.lineWidth = Math.max(0.6, j.r * 0.009);
        ctx.stroke();
      }
    }
    ctx.restore();

    j.x += j.vx + Math.sin(t * j.drift + j.phase) * 0.18;
    j.y += j.vy;
    if (j.y < -j.r * 3) {
      Object.assign(j, this.newJelly(H + j.r * 2, Math.random()));
    }
    if (j.x < -j.r * 3) j.x = W + j.r * 2;
    if (j.x > W + j.r * 3) j.x = -j.r * 2;
  }

  draw() {
    const t = this.t * 0.001;

    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#020b13');
    bg.addColorStop(0.28, '#031827');
    bg.addColorStop(0.68, '#01111c');
    bg.addColorStop(1, '#00060b');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    this.depthGlow.forEach(g => {
      const gr = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r);
      gr.addColorStop(0, `hsla(${g.hue},100%,60%,${g.a})`);
      gr.addColorStop(0.55, `hsla(${g.hue},100%,42%,${g.a * 0.35})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
      ctx.fill();
    });

    this.lightColumns.forEach((col, i) => {
      const shift = Math.sin(t * col.speed + i * 0.9) * W * 0.03;
      const g = ctx.createLinearGradient(col.x + shift, 0, col.x + shift, H);
      g.addColorStop(0, `rgba(110,220,255,${col.a})`);
      g.addColorStop(0.4, `rgba(110,220,255,${col.a * 0.35})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(col.x - col.width * 0.5 + shift, 0);
      ctx.lineTo(col.x + col.width * 0.5 + shift, 0);
      ctx.lineTo(col.x + col.width * 0.2 + shift, H);
      ctx.lineTo(col.x - col.width * 0.2 + shift, H);
      ctx.closePath();
      ctx.fill();
    });

    this.drawPlankton(this.planktonFar, t, false);

    const sorted = [...this.jellyfish].sort((a, b) => a.depth - b.depth);
    sorted.forEach(j => this.drawJelly(j, t));

    this.drawPlankton(this.planktonNear, t, true);

    const floorGlow = ctx.createRadialGradient(cx, H * 0.9, 0, cx, H * 0.9, Math.max(W, H) * 0.55);
    floorGlow.addColorStop(0, `rgba(0,170,210,${0.08 + 0.03 * Math.sin(t * 0.2)})`);
    floorGlow.addColorStop(0.45, `rgba(0,120,170,0.03)`);
    floorGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = floorGlow;
    ctx.fillRect(0, 0, W, H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 09 — Pulsar Magnetosphere
// ═══════════════════════════════════════════════
class Pulsar extends Scene {
  init() {
    this.angle = 0;
    this.fieldLines = Array.from({length:16}, (_,i) => ({
      angle: (i/16)*Math.PI*2, phase: rand(0,Math.PI*2)
    }));
    this.particles = Array.from({length:250}, () => this.spawnParticle());
    this.sweep = 0;
  }
  spawnParticle() {
    const a = rand(0,Math.PI*2);
    const r = rand(30, Math.min(W,H)*0.45);
    return { angle:a, r, speed:rand(0.5,2), drift:rand(-0.02,0.02), size:rand(0.5,3), life:rand(0,1), hue:rand(180,260) };
  }
  draw() {
    const t = this.t * 0.001;
    this.sweep = t * 2;

    ctx.fillStyle = 'rgba(0,0,5,0.25)';
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(cx,cy);

    // Magnetic field lines
    this.fieldLines.forEach(fl => {
      const a = fl.angle + t*0.05;
      const r = Math.min(W,H)*0.45;
      ctx.beginPath();
      ctx.moveTo(0,0);
      const cx2=Math.cos(a+0.5)*r*0.6, cy2=Math.sin(a+0.5)*r*0.6;
      const ex=Math.cos(a)*r, ey=Math.sin(a)*r;
      ctx.quadraticCurveTo(cx2,cy2,ex,ey);
      ctx.strokeStyle=`hsla(220,80%,60%,0.08)`;
      ctx.lineWidth=1; ctx.stroke();
    });

    // Sweep beam
    const beamWidth = 0.18;
    for(let layer=0;layer<3;layer++){
      const beamAlpha = [0.4,0.2,0.08][layer];
      const beamR = Math.min(W,H)*[0.45,0.5,0.55][layer];
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,beamR, this.sweep-beamWidth*(layer+1), this.sweep+beamWidth*(layer+1));
      ctx.closePath();
      const bg2=ctx.createRadialGradient(0,0,0,0,0,beamR);
      bg2.addColorStop(0,`rgba(180,220,255,${beamAlpha})`);
      bg2.addColorStop(0.7,`rgba(100,160,255,${beamAlpha*0.5})`);
      bg2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bg2; ctx.fill();

      // Opposite beam
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.arc(0,0,beamR, this.sweep+Math.PI-beamWidth*(layer+1), this.sweep+Math.PI+beamWidth*(layer+1));
      ctx.closePath();
      ctx.fillStyle=bg2; ctx.fill();
    }

    // Particles
    this.particles.forEach((p,i) => {
      p.life += 0.005;
      if(p.life > 1) this.particles[i] = this.spawnParticle();
      const alpha = Math.sin(p.life*Math.PI) * 0.7;
      const x = Math.cos(p.angle)*p.r, y = Math.sin(p.angle)*p.r;
      ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,80%,${alpha})`; ctx.fill();
      p.angle += p.drift; p.r -= p.speed * 0.3;
      if(p.r < 20) this.particles[i] = this.spawnParticle();
    });

    // Neutron star
    const starGlow = ctx.createRadialGradient(0,0,0,0,0,35);
    starGlow.addColorStop(0,`rgba(200,230,255,${0.95+0.05*Math.sin(t*10)})`);
    starGlow.addColorStop(0.3,'rgba(150,200,255,0.6)');
    starGlow.addColorStop(0.7,'rgba(80,130,255,0.2)');
    starGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=starGlow; ctx.fillRect(-100,-100,200,200);

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// SCENE 10 — Star Birth Nursery
// ═══════════════════════════════════════════════
class StarNursery extends Scene {
  init() {
    this.clouds = Array.from({length:8}, () => ({
      x: rand(0,W), y: rand(0,H),
      rx: rand(100,300), ry: rand(60,180),
      rotation: rand(0,Math.PI*2),
      hue: rand(270,330), opacity: rand(0.04,0.12)
    }));
    this.protostars = Array.from({length:12}, () => ({
      x: rand(W*0.1,W*0.9), y: rand(H*0.1,H*0.9),
      r: rand(3,15), brightness: rand(0.3,0.9),
      hue: rand(40,80), phase: rand(0,Math.PI*2), growing: true
    }));
    this.wisps = Array.from({length:200}, () => ({
      x: rand(0,W), y: rand(0,H),
      vx: rand(-0.3,0.3), vy: rand(-0.3,0.3),
      r: rand(1,4), hue: rand(260,340), a: rand(0.1,0.5), phase: rand(0,Math.PI*2)
    }));
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle = '#04000a'; ctx.fillRect(0,0,W,H);

    // Gas clouds
    this.clouds.forEach(c => {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rotation + t*0.02);
      const gr = ctx.createRadialGradient(0,0,0,0,0,c.rx);
      gr.addColorStop(0,`hsla(${c.hue},80%,60%,${c.opacity*1.5})`);
      gr.addColorStop(0.5,`hsla(${c.hue+20},70%,50%,${c.opacity})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr;
      ctx.scale(1, c.ry/c.rx);
      ctx.beginPath(); ctx.arc(0,0,c.rx,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // Wisps
    this.wisps.forEach(w => {
      const pulse = 0.5 + 0.5*Math.sin(t*2 + w.phase);
      ctx.beginPath(); ctx.arc(w.x,w.y,w.r,0,Math.PI*2);
      ctx.fillStyle = `hsla(${w.hue},90%,75%,${w.a*pulse})`; ctx.fill();
      w.x += w.vx; w.y += w.vy;
      if(w.x<0)w.x=W; if(w.x>W)w.x=0;
      if(w.y<0)w.y=H; if(w.y>H)w.y=0;
    });

    // Protostars
    this.protostars.forEach(p => {
      const pulse = 1 + 0.2*Math.sin(t*3 + p.phase);
      const r = p.r * pulse;

      // Glow aura
      const gr = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*8);
      gr.addColorStop(0,`hsla(${p.hue},100%,90%,${p.brightness*0.8})`);
      gr.addColorStop(0.3,`hsla(${p.hue},100%,70%,${p.brightness*0.2})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(p.x,p.y,r*8,0,Math.PI*2); ctx.fill();

      // Star core
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,95%,${p.brightness})`; ctx.fill();
    });

    // Removed the spotlight-like bipolar jet effect for a cleaner protostar view.
  }
}

// ═══════════════════════════════════════════════
// SCENE 11 — Emerald Nebula Tendrils
// ═══════════════════════════════════════════════
class EmeraldNebula extends Scene {
  init() {
    this.tendrils = Array.from({length:12}, (_,i) => ({
      startX: rand(0,W), startY: rand(0,H),
      points: Array.from({length:8}, () => ({ ox: rand(-200,200), oy: rand(-200,200) })),
      hue: rand(130,165), width: rand(2,8),
      phase: rand(0,Math.PI*2), speed: rand(0.2,0.5)
    }));
    this.nebulaClouds = Array.from({length:10}, () => ({
      x: rand(0,W), y: rand(0,H), r: rand(100,350),
      hue: rand(120,180), opacity: rand(0.03,0.09)
    }));
    this.stars = Array.from({length:400}, () => ({
      x:rand(0,W), y:rand(0,H), r:rand(0.2,1.5), a:rand(0.2,1), phase:rand(0,Math.PI*2)
    }));
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle = '#000805'; ctx.fillRect(0,0,W,H);

    // Nebula base
    this.nebulaClouds.forEach(c => {
      const gr = ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
      gr.addColorStop(0,`hsla(${c.hue},80%,50%,${c.opacity*1.8})`);
      gr.addColorStop(0.5,`hsla(${c.hue+10},70%,40%,${c.opacity})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
    });

    // Stars
    this.stars.forEach(s => {
      const f = 0.7+0.3*Math.sin(t*1.5+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,255,220,${s.a*f})`; ctx.fill();
    });

    // Tendrils
    this.tendrils.forEach(ten => {
      const pts = ten.points;
      ctx.beginPath();
      ctx.moveTo(ten.startX, ten.startY);
      for(let i=0;i<pts.length-1;i++){
        const x = ten.startX + pts[i].ox*(1+0.1*Math.sin(t*ten.speed+ten.phase+i));
        const y = ten.startY + pts[i].oy*(1+0.1*Math.cos(t*ten.speed+ten.phase+i));
        const nx = ten.startX + pts[i+1].ox*(1+0.1*Math.sin(t*ten.speed+ten.phase+i+1));
        const ny = ten.startY + pts[i+1].oy*(1+0.1*Math.cos(t*ten.speed+ten.phase+i+1));
        const mx=(x+nx)/2, my=(y+ny)/2;
        ctx.quadraticCurveTo(x,y,mx,my);
      }
      ctx.strokeStyle=`hsla(${ten.hue},100%,65%,0.25)`;
      ctx.lineWidth=ten.width; ctx.stroke();

      // Glow pass
      ctx.beginPath();
      ctx.moveTo(ten.startX, ten.startY);
      for(let i=0;i<pts.length-1;i++){
        const x = ten.startX + pts[i].ox*(1+0.1*Math.sin(t*ten.speed+ten.phase+i));
        const y = ten.startY + pts[i].oy*(1+0.1*Math.cos(t*ten.speed+ten.phase+i));
        const nx = ten.startX + pts[i+1].ox*(1+0.1*Math.sin(t*ten.speed+ten.phase+i+1));
        const ny = ten.startY + pts[i+1].oy*(1+0.1*Math.cos(t*ten.speed+ten.phase+i+1));
        ctx.quadraticCurveTo(x,y,(x+nx)/2,(y+ny)/2);
      }
      ctx.strokeStyle=`hsla(${ten.hue},100%,85%,0.1)`;
      ctx.lineWidth=ten.width*4; ctx.stroke();
    });

    // Mist overlay
    const mist = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));
    mist.addColorStop(0.2,`rgba(0,60,30,${0.06+0.02*Math.sin(t*0.3)})`);
    mist.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mist; ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 12 — Solar Wind / Magnetosphere
// ═══════════════════════════════════════════════
class SolarWind extends Scene {
  init() {
    this.planet = {
      x: W * 0.7,
      y: cy,
      r: Math.min(W, H) * 0.115,
      rot: 0
    };

    this.stars = Array.from({length: 220}, () => ({
      x: rand(0, W), y: rand(0, H),
      r: rand(0.4, 1.8), a: rand(0.2, 0.95), phase: rand(0, Math.PI * 2)
    }));

    this.streams = Array.from({length: 440}, () => this.newStream());
    this.specks = Array.from({length: 160}, () => ({
      x: rand(0, W), y: rand(0, H),
      r: rand(0.8, 2.4), hue: rand(28, 58),
      a: rand(0.08, 0.28), phase: rand(0, Math.PI * 2)
    }));

    this.fieldLines = Array.from({length: 15}, (_, i) => ({
      offset: lerp(-1, 1, i / 14),
      width: 0.8 + (i % 3) * 0.35,
      a: 0.08 + (1 - Math.abs(lerp(-1, 1, i / 14))) * 0.06
    }));

    this.auroraArcs = Array.from({length: 2}, (_, i) => ({
      side: i === 0 ? -1 : 1,
      phase: rand(0, Math.PI * 2)
    }));

    this.cloudBands = Array.from({length: 6}, () => ({
      phase: rand(0, Math.PI * 2),
      yBias: rand(-0.32, 0.32),
      a: rand(0.05, 0.12)
    }));
  }

  newStream() {
    const lane = Math.random();
    const y = lerp(-H * 0.1, H * 1.1, lane);
    return {
      x: rand(-W * 0.18, W * 0.12),
      y,
      vx: rand(3.4, 7.2),
      vy: rand(-0.12, 0.12),
      size: rand(1.3, 4.4),
      a: rand(0.15, 0.55),
      hue: rand(24, 54),
      seed: rand(0, Math.PI * 2)
    };
  }

  drawPlanetTexture(p, t) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.clip();

    const ocean = ctx.createRadialGradient(p.x - p.r * 0.35, p.y - p.r * 0.45, 0, p.x, p.y, p.r * 1.15);
    ocean.addColorStop(0, '#4b79d8');
    ocean.addColorStop(0.38, '#2457b6');
    ocean.addColorStop(0.72, '#14377c');
    ocean.addColorStop(1, '#06132b');
    ctx.fillStyle = ocean;
    ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);

    const land = [
      [-0.48, -0.15, 0.42, 0.22],
      [0.18, -0.06, 0.36, 0.2],
      [-0.12, 0.22, 0.3, 0.18],
      [0.34, 0.26, 0.16, 0.1]
    ];
    land.forEach((c, idx) => {
      ctx.save();
      ctx.translate(p.x + c[0] * p.r, p.y + c[1] * p.r);
      ctx.rotate((idx * 0.7) + Math.sin(t * 0.08 + idx) * 0.08);
      const lg = ctx.createRadialGradient(0, 0, 0, 0, 0, p.r * c[2]);
      lg.addColorStop(0, idx % 2 === 0 ? 'rgba(115,160,95,0.85)' : 'rgba(150,190,110,0.82)');
      lg.addColorStop(0.7, idx % 2 === 0 ? 'rgba(65,110,60,0.7)' : 'rgba(95,120,70,0.68)');
      lg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = lg;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.r * c[2], p.r * c[3], 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    this.cloudBands.forEach((band, i) => {
      ctx.save();
      ctx.translate(p.x, p.y + band.yBias * p.r);
      ctx.rotate(Math.sin(t * 0.15 + band.phase) * 0.08 + i * 0.09);
      const cg = ctx.createLinearGradient(-p.r, 0, p.r, 0);
      cg.addColorStop(0, 'rgba(255,255,255,0)');
      cg.addColorStop(0.2, `rgba(255,255,255,${band.a * 0.65})`);
      cg.addColorStop(0.5, `rgba(255,255,255,${band.a})`);
      cg.addColorStop(0.8, `rgba(255,255,255,${band.a * 0.4})`);
      cg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.r * 0.96, p.r * 0.11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    const shade = ctx.createLinearGradient(p.x - p.r * 0.7, 0, p.x + p.r * 0.6, 0);
    shade.addColorStop(0, 'rgba(0,0,0,0.02)');
    shade.addColorStop(0.55, 'rgba(0,0,0,0.08)');
    shade.addColorStop(0.82, 'rgba(0,0,0,0.35)');
    shade.addColorStop(1, 'rgba(0,0,0,0.62)');
    ctx.fillStyle = shade;
    ctx.fillRect(p.x - p.r, p.y - p.r, p.r * 2, p.r * 2);

    ctx.restore();
  }

  drawMagnetosphere(p, t) {
    for (let i = 0; i < 5; i++) {
      const rx = p.r * (1.95 + i * 0.28);
      const ry = p.r * (1.2 + i * 0.17);
      const grad = ctx.createRadialGradient(p.x - rx * 0.38, p.y, 0, p.x - rx * 0.12, p.y, rx * 1.18);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.62, `rgba(95,155,255,${0.045 - i * 0.007})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(p.x + p.r * 0.03, p.y, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    const tail = ctx.createLinearGradient(p.x + p.r * 0.8, p.y, W, p.y);
    tail.addColorStop(0, 'rgba(85,145,255,0.16)');
    tail.addColorStop(0.2, 'rgba(85,145,255,0.08)');
    tail.addColorStop(1, 'rgba(85,145,255,0)');
    ctx.fillStyle = tail;
    ctx.beginPath();
    ctx.moveTo(p.x + p.r * 0.72, p.y - p.r * 0.48);
    ctx.bezierCurveTo(W * 0.82, p.y - p.r * 0.42, W * 0.94, p.y - p.r * 0.2, W, p.y - p.r * 0.12);
    ctx.lineTo(W, p.y + p.r * 0.12);
    ctx.bezierCurveTo(W * 0.94, p.y + p.r * 0.2, W * 0.82, p.y + p.r * 0.42, p.x + p.r * 0.72, p.y + p.r * 0.48);
    ctx.closePath();
    ctx.fill();

    this.fieldLines.forEach(line => {
      const off = line.offset;
      const topY = p.y + off * p.r * 1.02;
      ctx.strokeStyle = `rgba(130,190,255,${line.a})`;
      ctx.lineWidth = line.width;
      ctx.beginPath();
      ctx.moveTo(p.x - p.r * 2.2, topY);
      ctx.bezierCurveTo(p.x - p.r * 1.45, topY - off * p.r * 0.85, p.x - p.r * 0.2, p.y - off * p.r * 1.26, p.x + p.r * 0.82, p.y - off * p.r * 0.52);
      ctx.bezierCurveTo(p.x + p.r * 1.8, p.y - off * p.r * 0.18, W * 0.92, p.y - off * p.r * 0.12, W, p.y - off * p.r * 0.08);
      ctx.stroke();
    });

    this.auroraArcs.forEach((arc, i) => {
      const ay = p.y + arc.side * p.r * 0.68;
      const grad = ctx.createRadialGradient(p.x - p.r * 0.1, ay, 0, p.x - p.r * 0.05, ay, p.r * 0.75);
      grad.addColorStop(0, `rgba(80,255,180,${0.18 + 0.04 * Math.sin(t * 1.5 + arc.phase)})`);
      grad.addColorStop(0.45, `rgba(40,170,255,${0.08 + 0.02 * Math.cos(t * 1.1 + arc.phase)})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(p.x - p.r * 0.08, ay, p.r * 0.38, p.r * 0.18, arc.side * 0.25, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  drawSolarWindParticle(s, p, t) {
    const shieldR = p.r * 2.15;
    let x = s.x;
    let y = s.y;
    let bend = 0;

    const dx = x - p.x;
    const dy = y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (x < p.x + p.r * 0.5 && dist < shieldR * 1.35) {
      const influence = clamp(1 - dist / (shieldR * 1.35), 0, 1);
      bend = influence * (dy >= 0 ? 1 : -1) * (14 + influence * 22);
      x += influence * -10;
      y += bend;
    }

    const tailX = x - s.size * (9 + Math.sin(t * 2 + s.seed) * 2);
    const g = ctx.createLinearGradient(tailX, y, x, y);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.45, `hsla(${s.hue},100%,74%,${s.a * 0.28})`);
    g.addColorStop(1, `hsla(${s.hue},100%,86%,${s.a})`);
    ctx.strokeStyle = g;
    ctx.lineWidth = s.size;
    ctx.beginPath();
    ctx.moveTo(tailX, y - bend * 0.04);
    ctx.quadraticCurveTo((tailX + x) * 0.5, y - bend * 0.22, x, y);
    ctx.stroke();

    s.x += s.vx;
    s.y += s.vy + bend * 0.01;
    if (s.x > W + 50 || s.y < -H * 0.12 || s.y > H * 1.12) {
      Object.assign(s, this.newStream());
    }
  }

  draw() {
    const t = this.t * 0.001;
    const p = this.planet;
    p.rot += 0.0008;

    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#05060c');
    bg.addColorStop(0.35, '#09060c');
    bg.addColorStop(0.7, '#03040a');
    bg.addColorStop(1, '#010107');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    this.stars.forEach(st => {
      const flicker = 0.72 + 0.28 * Math.sin(t * 1.4 + st.phase);
      ctx.fillStyle = `rgba(255,245,230,${st.a * flicker})`;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
      ctx.fill();
    });

    const sunCore = ctx.createRadialGradient(-W * 0.08, cy, 0, -W * 0.08, cy, H * 0.82);
    sunCore.addColorStop(0, `rgba(255,248,210,${0.98})`);
    sunCore.addColorStop(0.14, `rgba(255,213,105,${0.92})`);
    sunCore.addColorStop(0.34, `rgba(255,132,32,0.36)`);
    sunCore.addColorStop(0.68, `rgba(255,92,12,0.08)`);
    sunCore.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sunCore;
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 3; i++) {
      const cor = ctx.createRadialGradient(-W * 0.12, cy + Math.sin(t * 0.5 + i) * 20, H * (0.1 + i * 0.03), -W * 0.12, cy, H * (0.52 + i * 0.16));
      cor.addColorStop(0, `rgba(255,190,85,${0.08 - i * 0.018})`);
      cor.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cor;
      ctx.fillRect(0, 0, W, H);
    }

    this.specks.forEach(sp => {
      const glow = 0.55 + 0.45 * Math.sin(t * 2.2 + sp.phase);
      ctx.fillStyle = `hsla(${sp.hue},100%,72%,${sp.a * glow})`;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI * 2);
      ctx.fill();
      sp.x += 0.9;
      if (sp.x > W + 8) sp.x = -8;
    });

    this.streams.forEach(s => this.drawSolarWindParticle(s, p, t));

    this.drawMagnetosphere(p, t);
    this.drawPlanetTexture(p, t);

    const atmos = ctx.createRadialGradient(p.x, p.y, p.r * 0.94, p.x, p.y, p.r * 1.17);
    atmos.addColorStop(0, 'rgba(0,0,0,0)');
    atmos.addColorStop(0.58, 'rgba(110,180,255,0.18)');
    atmos.addColorStop(0.84, `rgba(130,205,255,${0.52 + 0.06 * Math.sin(t * 0.6)})`);
    atmos.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = atmos;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 1.17, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 18; i++) {
      const ang = (i / 18) * Math.PI * 2;
      const rx = p.x - p.r * 0.04 + Math.cos(ang) * p.r * 0.54;
      const ry = p.y + Math.sin(ang) * p.r * 0.72;
      const gg = ctx.createRadialGradient(rx, ry, 0, rx, ry, p.r * 0.08);
      gg.addColorStop(0, `rgba(120,255,210,${0.05 + 0.04 * Math.sin(t * 2 + i)})`);
      gg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gg;
      ctx.beginPath();
      ctx.arc(rx, ry, p.r * 0.08, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ═══════════════════════════════════════════════
// SCENE 13 — Rose Nebula / Pink Hydrogen Cloud
// ═══════════════════════════════════════════════
class RoseNebula extends Scene {
  init() {
    this.clouds = Array.from({length:15}, () => ({
      x: rand(-W*0.1,W*1.1), y: rand(-H*0.1,H*1.1),
      r: rand(100,400), hue: rand(320,360), sat: rand(60,100),
      opacity: rand(0.03,0.1), rotation: rand(0,Math.PI*2)
    }));
    this.filaments = Array.from({length:80}, () => ({
      x: rand(0,W), y: rand(0,H),
      angle: rand(0,Math.PI*2), len: rand(30,150),
      width: rand(0.5,3), hue: rand(300,360), a: rand(0.05,0.2)
    }));
    this.stars = Array.from({length:500}, () => ({
      x:rand(0,W),y:rand(0,H),r:rand(0.2,2),a:rand(0.2,1),hue:rand(0,40),phase:rand(0,Math.PI*2)
    }));
    // Hot O-type stars
    this.hotStars = Array.from({length:6}, () => ({
      x:rand(W*0.15,W*0.85), y:rand(H*0.15,H*0.85), r:rand(4,12), phase:rand(0,Math.PI*2)
    }));
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='#080003'; ctx.fillRect(0,0,W,H);

    // Gas clouds
    this.clouds.forEach(c => {
      ctx.save();
      ctx.translate(c.x,c.y); ctx.rotate(c.rotation + t*0.01);
      const gr = ctx.createRadialGradient(0,0,0,0,0,c.r);
      gr.addColorStop(0,`hsla(${c.hue},${c.sat}%,55%,${c.opacity*2})`);
      gr.addColorStop(0.4,`hsla(${c.hue-15},${c.sat}%,45%,${c.opacity})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.scale(1, rand(0.6,0.9));
      ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // Filaments
    this.filaments.forEach(f => {
      const wave = Math.sin(t*0.5 + f.x*0.01) * 20;
      ctx.save();
      ctx.translate(f.x+wave, f.y);
      ctx.rotate(f.angle + t*0.05);
      ctx.beginPath();
      ctx.moveTo(0,-f.len/2);
      ctx.lineTo(0,f.len/2);
      const fg = ctx.createLinearGradient(0,-f.len/2,0,f.len/2);
      fg.addColorStop(0,'rgba(0,0,0,0)');
      fg.addColorStop(0.5,`hsla(${f.hue},100%,75%,${f.a})`);
      fg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.strokeStyle=fg; ctx.lineWidth=f.width; ctx.stroke();
      ctx.restore();
    });

    // Stars
    this.stars.forEach(s => {
      const f=0.7+0.3*Math.sin(t*2+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},40%,95%,${s.a*f})`; ctx.fill();
    });

    // Hot ionizing stars
    this.hotStars.forEach(h => {
      const pulse=1+0.15*Math.sin(t*4+h.phase);
      const r=h.r*pulse;
      const gr=ctx.createRadialGradient(h.x,h.y,0,h.x,h.y,r*15);
      gr.addColorStop(0,`rgba(255,255,255,${0.9+0.1*Math.sin(t*5+h.phase)})`);
      gr.addColorStop(0.05,`rgba(200,220,255,0.6)`);
      gr.addColorStop(0.3,`rgba(180,100,200,0.15)`);
      gr.addColorStop(0.6,`rgba(180,30,100,0.06)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
      ctx.beginPath(); ctx.arc(h.x,h.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,1)'; ctx.fill();
    });
  }
}

// ═══════════════════════════════════════════════
// SCENE 14 — Deep Void / Infinite Stars
// ═══════════════════════════════════════════════
class InfiniteStars extends Scene {
  init() {
    this.layers = [
      Array.from({length:1000},()=>({x:rand(0,W),y:rand(0,H),r:rand(0.1,0.5),a:rand(0.1,0.4),speed:0.05,phase:rand(0,Math.PI*2)})),
      Array.from({length:500},()=>({x:rand(0,W),y:rand(0,H),r:rand(0.3,1.2),a:rand(0.3,0.8),speed:0.15,phase:rand(0,Math.PI*2)})),
      Array.from({length:150},()=>({x:rand(0,W),y:rand(0,H),r:rand(0.8,2.5),a:rand(0.5,1),speed:0.3,phase:rand(0,Math.PI*2)})),
    ];
    this.nebulae = Array.from({length:5},()=>({
      x:rand(0,W),y:rand(0,H),r:rand(150,400),hue:rand(200,280),a:rand(0.02,0.07)
    }));
    this.milkyWay = { angle: rand(0.2,0.6), width: H*rand(0.08,0.15) };
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='#000000'; ctx.fillRect(0,0,W,H);

    // Milky Way band
    const mw = this.milkyWay;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(mw.angle);
    const mwGrad = ctx.createLinearGradient(0,-mw.width,0,mw.width);
    mwGrad.addColorStop(0,'rgba(255,240,200,0)');
    mwGrad.addColorStop(0.5,`rgba(255,240,200,${0.04+0.01*Math.sin(t*0.2)})`);
    mwGrad.addColorStop(1,'rgba(255,240,200,0)');
    ctx.fillStyle=mwGrad; ctx.fillRect(-W,-mw.width*2,W*2,mw.width*4);
    ctx.restore();

    // Faint nebulae
    this.nebulae.forEach(n=>{
      const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      gr.addColorStop(0,`hsla(${n.hue},60%,60%,${n.a*2})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    });

    // Star layers
    this.layers.forEach((layer,li)=>{
      layer.forEach(s=>{
        const twinkle = 0.6+0.4*Math.sin(t*(1.5+li)+s.phase);
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,245,220,${s.a*twinkle})`; ctx.fill();
        s.x -= s.speed;
        if(s.x < -5) { s.x=W+5; s.y=rand(0,H); }
      });
    });

    // Occasional bright star with diffraction spikes
    const bs = this.layers[2][0];
    if(bs) {
      for(let a=0;a<4;a++){
        const angle = (a/4)*Math.PI + t*0.1;
        const len = bs.r * 20 * bs.a;
        const sg = ctx.createLinearGradient(
          bs.x+Math.cos(angle)*len, bs.y+Math.sin(angle)*len,
          bs.x+Math.cos(angle+Math.PI)*len, bs.y+Math.sin(angle+Math.PI)*len
        );
        sg.addColorStop(0,'rgba(255,255,255,0)');
        sg.addColorStop(0.5,`rgba(255,245,200,${bs.a*0.8})`);
        sg.addColorStop(1,'rgba(255,255,255,0)');
        ctx.beginPath();
        ctx.moveTo(bs.x+Math.cos(angle)*len, bs.y+Math.sin(angle)*len);
        ctx.lineTo(bs.x+Math.cos(angle+Math.PI)*len, bs.y+Math.sin(angle+Math.PI)*len);
        ctx.strokeStyle=sg; ctx.lineWidth=0.5; ctx.stroke();
      }
    }
  }
}

// ═══════════════════════════════════════════════
// SCENE 15 — Wormhole / Einstein-Rosen Bridge
// ═══════════════════════════════════════════════
class Wormhole extends Scene {
  init() {
    this.rings = Array.from({length:40}, (_,i) => ({
      z: i/39, speed: rand(0.003,0.008)
    }));
    this.particles = Array.from({length:300}, () => ({
      angle: rand(0,Math.PI*2), z: rand(0,1),
      r: rand(1,3), speed: rand(0.005,0.015), hue: rand(200,300)
    }));
    this.stars = Array.from({length:300}, () => ({
      x:rand(0,W), y:rand(0,H), r:rand(0.2,1.5), a:rand(0.1,0.5)
    }));
  }
  draw() {
    const t = this.t * 0.001;

    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.95);
    bg.addColorStop(0, '#0a0813');
    bg.addColorStop(0.55, '#03040a');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    this.stars.forEach(s=>{
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${s.a})`; ctx.fill();
    });

    ctx.save(); ctx.translate(cx,cy);

    const maxR = Math.min(W,H)*0.42;

    // Tunnel rings
    this.rings.forEach(ring => {
      ring.z -= ring.speed;
      if(ring.z < 0) ring.z = 1;
      const perspective = 1 / (1 + ring.z * 3);
      const r = maxR * perspective;
      const distort = 1 - ring.z;
      const alpha = clamp(distort * 0.6, 0, 0.5);
      const hue = lerp(280, 200, ring.z);
      ctx.beginPath();
      ctx.ellipse(0,0,r,r*0.6,0,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${hue},80%,70%,${alpha})`;
      ctx.lineWidth=clamp(2-ring.z*1.5, 0.3, 2);
      ctx.stroke();
    });

    // Particles spiraling in
    this.particles.forEach((p,i) => {
      p.z -= p.speed;
      p.angle += 0.02;
      if(p.z < 0) { p.z=1; p.angle=rand(0,Math.PI*2); }
      const perspective = 1/(1+p.z*3);
      const r = maxR * perspective;
      const x = Math.cos(p.angle) * r;
      const y = Math.sin(p.angle) * r * 0.6;
      const alpha = clamp((1-p.z)*0.8, 0, 0.8);
      ctx.beginPath(); ctx.arc(x,y,p.r*perspective,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},100%,80%,${alpha})`; ctx.fill();
    });

    // Center portal
    const pg = ctx.createRadialGradient(0,0,0,0,0,maxR*0.12);
    pg.addColorStop(0,`rgba(250,240,255,${0.9+0.1*Math.sin(t*5)})`);
    pg.addColorStop(0.3,'rgba(200,150,255,0.4)');
    pg.addColorStop(0.7,'rgba(100,50,200,0.1)');
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg; ctx.fillRect(-maxR,-maxR,maxR*2,maxR*2);

    // Outer edge
    const eg=ctx.createRadialGradient(0,0,maxR*0.85,0,0,maxR*1.05);
    eg.addColorStop(0,'rgba(0,0,0,0)');
    eg.addColorStop(0.5,`rgba(80,40,180,${0.4+0.1*Math.sin(t*2)})`);
    eg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,0,maxR*1.05,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,maxR,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.fill();

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// SCENE 16 — Amber Cosmic Dust Storm
// ═══════════════════════════════════════════════
class DustStorm extends Scene {
  init() {
    this.particles = Array.from({length:600}, () => this.newParticle());
    this.clouds = Array.from({length:6}, () => ({
      x:rand(0,W), y:rand(0,H), r:rand(150,350), hue:rand(20,50), a:rand(0.03,0.08),
      vx:rand(-0.5,0.5), vy:rand(-0.3,0.3)
    }));
  }
  newParticle() {
    return {
      x: rand(-50,W+50), y: rand(0,H),
      vx: rand(0.5,3), vy: rand(-0.5,0.5),
      r: rand(0.5,3), a: rand(0.2,0.8), hue: rand(25,60)
    };
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='rgba(10,4,0,0.3)'; ctx.fillRect(0,0,W,H);

    this.clouds.forEach(c=>{
      const gr=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
      gr.addColorStop(0,`hsla(${c.hue},80%,50%,${c.a*2})`);
      gr.addColorStop(0.5,`hsla(${c.hue+10},70%,40%,${c.a})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
      c.x+=c.vx; c.y+=c.vy;
      if(c.x<-c.r) c.x=W+c.r; if(c.x>W+c.r) c.x=-c.r;
      if(c.y<-c.r) c.y=H+c.r; if(c.y>H+c.r) c.y=-c.r;
    });

    // Wind streaks
    ctx.save();
    ctx.globalAlpha=0.15;
    for(let i=0;i<8;i++){
      const y=H/8*i + Math.sin(t*0.3+i)*50;
      const wg=ctx.createLinearGradient(0,y,W,y);
      wg.addColorStop(0,'rgba(0,0,0,0)');
      wg.addColorStop(0.3,`hsla(${35+i*3},80%,60%,1)`);
      wg.addColorStop(0.7,`hsla(${35+i*3},80%,60%,0.5)`);
      wg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=wg; ctx.fillRect(0,y-1,W,2+i%3);
    }
    ctx.restore();

    this.particles.forEach((p,i)=>{
      const turbX = Math.sin(t*2+p.y*0.02)*2;
      p.x+=p.vx+turbX; p.y+=p.vy;
      if(p.x>W+50) this.particles[i]=this.newParticle();
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,70%,${p.a})`; ctx.fill();
    });

    // Backlit glow
    const bl=ctx.createRadialGradient(W*0.15,cy,0,W*0.15,cy,H*0.7);
    bl.addColorStop(0,`rgba(255,160,30,${0.15+0.05*Math.sin(t*0.5)})`);
    bl.addColorStop(0.4,'rgba(180,80,10,0.05)');
    bl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bl; ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 17 — Quantum Vacuum / Spacetime Foam
// ═══════════════════════════════════════════════
class QuantumFoam extends Scene {
  init() {
    this.bubbles = Array.from({length:80}, () => this.newBubble());
    this.grid = { cells: [], cols:30, rows:20 };
    const gw=W/this.grid.cols, gh=H/this.grid.rows;
    for(let r=0;r<this.grid.rows;r++) {
      for(let c=0;c<this.grid.cols;c++) {
        this.grid.cells.push({ x:c*gw+gw/2, y:r*gh+gh/2, phase:rand(0,Math.PI*2), amp:rand(2,8) });
      }
    }
  }
  newBubble() {
    return {
      x:rand(0,W), y:rand(0,H), r:rand(3,25),
      life:0, maxLife:rand(60,180),
      hue:rand(180,280), opacity:rand(0.1,0.4)
    };
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='rgba(0,2,10,0.4)'; ctx.fillRect(0,0,W,H);

    // Grid distortion
    const gw=W/this.grid.cols, gh=H/this.grid.rows;
    this.grid.cells.forEach(cell=>{
      const dx=Math.sin(t*2+cell.phase)*cell.amp;
      const dy=Math.cos(t*1.7+cell.phase+1)*cell.amp*0.7;
      const intensity=Math.abs(Math.sin(t*3+cell.phase));
      ctx.beginPath();
      ctx.arc(cell.x+dx, cell.y+dy, 1.5, 0, Math.PI*2);
      ctx.fillStyle=`rgba(80,150,255,${intensity*0.15})`; ctx.fill();
    });

    // Bubbles (quantum fluctuations)
    this.bubbles.forEach((b,i)=>{
      b.life++;
      if(b.life>b.maxLife) { this.bubbles[i]=this.newBubble(); return; }
      const prog=b.life/b.maxLife;
      const alpha=prog<0.2?prog/0.2:prog>0.8?(1-prog)/0.2:1;
      const r=b.r*(prog<0.5?prog/0.5:1-(prog-0.5)/0.5*0.3);

      ctx.beginPath(); ctx.arc(b.x,b.y,r,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${b.hue},80%,70%,${alpha*b.opacity})`;
      ctx.lineWidth=1.5; ctx.stroke();

      const inner=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
      inner.addColorStop(0,`hsla(${b.hue},100%,90%,${alpha*b.opacity*0.3})`);
      inner.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=inner; ctx.fill();
    });

    // Energy waves
    for(let i=0;i<3;i++){
      const wt=t*0.5+i*Math.PI*0.67;
      const wr=Math.min(W,H)*(0.1+0.4*(wt%1));
      const wa=0.1*(1-(wt%1));
      ctx.beginPath(); ctx.arc(cx,cy,wr,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,180,255,${wa})`; ctx.lineWidth=2; ctx.stroke();
    }

    ctx.fillStyle='rgba(0,2,10,0.1)'; ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 18 — Binary Stars / Orbital Dance
// ═══════════════════════════════════════════════
class BinaryStars extends Scene {
  init() {
    this.star1 = { x:0, y:0, r:35, hue:40, mass:1.2 };
    this.star2 = { x:0, y:0, r:22, hue:220, mass:0.8 };
    this.orbit = { angle:0, a:Math.min(W,H)*0.18, b:Math.min(W,H)*0.1, speed:0.3 };
    this.debris = Array.from({length:300}, () => this.newDebris());
    this.trails = {s1:[], s2:[]};
  }
  newDebris() {
    const angle=rand(0,Math.PI*2);
    const r=rand(Math.min(W,H)*0.12, Math.min(W,H)*0.45);
    return { angle, r, speed:rand(0.1,0.5)*(1/Math.sqrt(r/50)), size:rand(0.5,2.5), hue:rand(30,80) };
  }
  draw() {
    const t = this.t * 0.001;
    this.orbit.angle += this.orbit.speed * 0.016;

    ctx.fillStyle='rgba(0,0,5,0.25)'; ctx.fillRect(0,0,W,H);

    if(!this._bgStars) this._bgStars=Array.from({length:400},()=>({x:rand(0,W),y:rand(0,H),r:rand(0.2,1.5),a:rand(0.1,0.5)}));
    this._bgStars.forEach(s=>{
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${s.a})`;ctx.fill();
    });

    const a=this.orbit;
    const s1x = cx + Math.cos(a.angle)*a.a*this.star2.mass/(this.star1.mass+this.star2.mass);
    const s1y = cy + Math.sin(a.angle)*a.b*this.star2.mass/(this.star1.mass+this.star2.mass);
    const s2x = cx - Math.cos(a.angle)*a.a*this.star1.mass/(this.star1.mass+this.star2.mass);
    const s2y = cy - Math.sin(a.angle)*a.b*this.star1.mass/(this.star1.mass+this.star2.mass);

    this.star1.x=s1x; this.star1.y=s1y;
    this.star2.x=s2x; this.star2.y=s2y;

    // Trails
    this.trails.s1.push({x:s1x,y:s1y}); this.trails.s2.push({x:s2x,y:s2y});
    if(this.trails.s1.length>60) this.trails.s1.shift();
    if(this.trails.s2.length>60) this.trails.s2.shift();

    [[this.trails.s1,40],[this.trails.s2,220]].forEach(([trail,hue])=>{
      trail.forEach((pt,i)=>{
        const alpha=(i/trail.length)*0.4;
        ctx.beginPath(); ctx.arc(pt.x,pt.y,1.5*(i/trail.length),0,Math.PI*2);
        ctx.fillStyle=`hsla(${hue},100%,80%,${alpha})`; ctx.fill();
      });
    });

    // Accretion bridge (mass transfer)
    if(this.t > 1000) {
      ctx.beginPath();
      ctx.moveTo(s1x,s1y);
      const mx=(s1x+s2x)/2+Math.sin(t)*30, my=(s1y+s2y)/2+Math.cos(t)*30;
      ctx.quadraticCurveTo(mx,my,s2x,s2y);
      ctx.strokeStyle=`rgba(180,150,255,0.12)`; ctx.lineWidth=8; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s1x,s1y); ctx.quadraticCurveTo(mx,my,s2x,s2y);
      ctx.strokeStyle=`rgba(220,200,255,0.06)`; ctx.lineWidth=20; ctx.stroke();
    }

    // Orbital debris
    this.debris.forEach(d=>{
      d.angle += d.speed*0.016;
      const x=cx+Math.cos(d.angle)*d.r, y=cy+Math.sin(d.angle)*d.r*0.5;
      ctx.beginPath(); ctx.arc(x,y,d.size,0,Math.PI*2);
      ctx.fillStyle=`hsla(${d.hue},80%,80%,0.5)`; ctx.fill();
    });

    // Draw stars
    [[this.star1,'#fff8e0'],[this.star2,'#a0c0ff']].forEach(([star,color])=>{
      const pulse=1+0.05*Math.sin(t*3+star.hue);
      const gr=ctx.createRadialGradient(star.x,star.y,0,star.x,star.y,star.r*pulse*5);
      gr.addColorStop(0,color);
      gr.addColorStop(0.2,`hsla(${star.hue},80%,80%,0.6)`);
      gr.addColorStop(0.6,`hsla(${star.hue},70%,60%,0.15)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
      ctx.beginPath(); ctx.arc(star.x,star.y,star.r*pulse,0,Math.PI*2);
      ctx.fillStyle=color; ctx.fill();
    });
  }
}

// ═══════════════════════════════════════════════
// SCENE 19 — Deep Field (like Hubble Deep Field)
// ═══════════════════════════════════════════════
class DeepField extends Scene {
  init() {
    this.galaxies = Array.from({length:60}, () => ({
      x:rand(W*0.05,W*0.95), y:rand(H*0.05,H*0.95),
      type:randInt(0,4), // 0=elliptical, 1=spiral, 2=irregular, 3=lenticular
      r:rand(5,50), angle:rand(0,Math.PI*2),
      hue:rand(20,280), brightness:rand(0.3,1),
      redshift:rand(0,1) // 0=nearby, 1=very distant (redder, smaller)
    }));
    this.stars = Array.from({length:800},()=>({x:rand(0,W),y:rand(0,H),r:rand(0.1,1.5),a:rand(0.1,0.8),phase:rand(0,Math.PI*2)}));
  }
  drawGalaxy(g, t) {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.angle + t*0.01*(1-g.redshift));

    const sizeFactor = lerp(1,0.2,g.redshift);
    const r = g.r * sizeFactor;
    const hue = lerp(g.hue, g.hue+40, g.redshift); // redder at distance

    if(g.type === 0) { // Elliptical
      const gr = ctx.createRadialGradient(0,0,0,0,0,r);
      gr.addColorStop(0,`hsla(${hue},30%,95%,${g.brightness})`);
      gr.addColorStop(0.4,`hsla(${hue},40%,70%,${g.brightness*0.5})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.scale(1,0.6);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    } else if(g.type === 1) { // Spiral
      const gr = ctx.createRadialGradient(0,0,0,0,0,r*0.4);
      gr.addColorStop(0,`hsla(${hue+20},60%,95%,${g.brightness})`);
      gr.addColorStop(1,`hsla(${hue},50%,60%,${g.brightness*0.3})`);
      ctx.fillStyle=gr; ctx.scale(1,0.5);
      ctx.beginPath(); ctx.arc(0,0,r*0.4,0,Math.PI*2); ctx.fill();

      for(let arm=0;arm<2;arm++){
        ctx.beginPath();
        for(let i=0;i<20;i++){
          const at=(i/19)*Math.PI*2+arm*Math.PI;
          const ar=i/19*r;
          const x=Math.cos(at)*ar, y=Math.sin(at)*ar*0.5;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.strokeStyle=`hsla(${hue},70%,80%,${g.brightness*0.4})`;
        ctx.lineWidth=r*0.15; ctx.stroke();
      }
    } else if(g.type === 2) { // Irregular
      for(let i=0;i<8;i++){
        const ia=rand(0,Math.PI*2), ir=rand(r*0.3,r);
        const igr=ctx.createRadialGradient(Math.cos(ia)*ir*0.3,Math.sin(ia)*ir*0.3,0,Math.cos(ia)*ir*0.3,Math.sin(ia)*ir*0.3,ir*0.5);
        igr.addColorStop(0,`hsla(${hue+i*15},70%,80%,${g.brightness*0.5})`);
        igr.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=igr; ctx.beginPath(); ctx.arc(Math.cos(ia)*ir*0.3,Math.sin(ia)*ir*0.3,ir*0.5,0,Math.PI*2); ctx.fill();
      }
    } else { // Lenticular
      const gr = ctx.createRadialGradient(0,0,0,0,0,r);
      gr.addColorStop(0,`hsla(${hue+10},20%,90%,${g.brightness})`);
      gr.addColorStop(0.5,`hsla(${hue},30%,60%,${g.brightness*0.4})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.scale(1,0.25);
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='rgba(0,0,3,0.2)'; ctx.fillRect(0,0,W,H);
    if(this.t < 50) { ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); }

    // Stars
    this.stars.forEach(s=>{
      const f=0.8+0.2*Math.sin(t*2+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,250,240,${s.a*f})`; ctx.fill();
    });

    // Galaxies
    this.galaxies.forEach(g => this.drawGalaxy(g,t));
  }
}

// ═══════════════════════════════════════════════
// SCENE 20 — Cosmic Microwave Background / Heat Death
// ═══════════════════════════════════════════════
class CMBScene extends Scene {
  init() {
    this.canvas2 = document.createElement('canvas');
    this.canvas2.width = 300; this.canvas2.height = 200;
    this.ctx2 = this.canvas2.getContext('2d');
    this.generateCMB();
    this.phase = 0;
    this.particles = Array.from({length:100},()=>({
      x:rand(0,W),y:rand(0,H),vx:rand(-0.2,0.2),vy:rand(-0.2,0.2),
      r:rand(0.5,2),a:rand(0.1,0.3),phase:rand(0,Math.PI*2)
    }));
  }
  generateCMB() {
    const imgData = this.ctx2.createImageData(300,200);
    for(let i=0;i<imgData.data.length;i+=4){
      const v = Math.random();
      const hue = lerp(200,10,v);
      const r2 = Math.sin(hue/360*Math.PI)*150+105;
      const b2 = Math.cos(hue/360*Math.PI)*150+105;
      imgData.data[i] = clamp(r2,0,255);
      imgData.data[i+1] = 50;
      imgData.data[i+2] = clamp(b2,0,255);
      imgData.data[i+3] = 255;
    }
    this.ctx2.putImageData(imgData,0,0);
  }
  draw() {
    const t = this.t * 0.001;
    this.phase += 0.001;

    // Draw CMB texture scaled up
    ctx.save();
    ctx.globalAlpha = 0.35 + 0.05*Math.sin(t*0.3);
    ctx.filter = 'blur(40px)';
    ctx.drawImage(this.canvas2, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.restore();

    ctx.fillStyle = `rgba(0,0,0,${0.3+0.1*Math.sin(t*0.1)})`;
    ctx.fillRect(0,0,W,H);

    // Gentle particle drift (last photons)
    this.particles.forEach(p=>{
      const pulse=0.5+0.5*Math.sin(t*2+p.phase);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${p.a*pulse})`; ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });

    // Temperature fluctuation overlay
    for(let i=0;i<5;i++){
      const ox=Math.sin(t*0.2+i*1.3)*W*0.3+cx;
      const oy=Math.cos(t*0.15+i*1.7)*H*0.3+cy;
      const gr=ctx.createRadialGradient(ox,oy,0,ox,oy,200);
      const hot=i%2===0;
      gr.addColorStop(0,`rgba(${hot?200:10},${hot?60:40},${hot?20:180},0.06)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    }
  }
}

    return {
      x:rand(W*0.05,W*0.95), y:rand(H*0.05,H*0.95),
      r:rand(8,40), sides:randInt(5,8), rotation:rand(0,Math.PI*2),
      speed:rand(0.1,0.4), hue:rand(185,225), brightness:rand(0.3,0.8),
      phase:rand(0,Math.PI*2)
    };
  }
  drawHexagon(x,y,r,rot,sides) {
    ctx.beginPath();
    for(let i=0;i<=sides;i++){
      const a=rot + (i/sides)*Math.PI*2;
      if(i===0) ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
      else ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    }
    ctx.closePath();
  }
  draw() {
    const t = this.t * 0.001;
    ctx.fillStyle='#000508'; ctx.fillRect(0,0,W,H);

    this.background.forEach(b=>{
      const gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      gr.addColorStop(0,`hsla(${b.hue},70%,60%,${b.a*2})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    });

    // Snow flakes
    this.flakes.forEach(f=>{
      const pulse=0.6+0.4*Math.sin(t*3+f.phase);
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,240,255,${f.a*pulse})`; ctx.fill();
      f.x+=f.vx; f.y+=f.vy;
      if(f.x<0)f.x=W; if(f.x>W)f.x=0;
      if(f.y<0)f.y=H; if(f.y>H)f.y=0;
    });

    // Crystal formations
    this.crystals.forEach(c=>{
      const pulse=1+0.12*Math.sin(t*c.speed+c.phase);
      const r=c.r*pulse;
      const rot=c.rotation+t*c.speed*0.3;

      // Outer glow
      this.drawHexagon(c.x,c.y,r*3,rot,c.sides);
      const gr=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,r*3);
      gr.addColorStop(0,`hsla(${c.hue},90%,80%,${c.brightness*0.2})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fill();

      // Crystal body
      this.drawHexagon(c.x,c.y,r,rot,c.sides);
      ctx.strokeStyle=`hsla(${c.hue},90%,85%,${c.brightness*0.7})`;
      ctx.lineWidth=1.5; ctx.stroke();

      // Inner facets
      for(let i=0;i<c.sides;i++){
        const a=rot+(i/c.sides)*Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(c.x,c.y);
        ctx.lineTo(c.x+Math.cos(a)*r, c.y+Math.sin(a)*r);
        ctx.strokeStyle=`hsla(${c.hue},80%,90%,${c.brightness*0.2})`;
        ctx.lineWidth=0.8; ctx.stroke();
      }

      // Highlight
      ctx.beginPath(); ctx.arc(c.x-r*0.25, c.y-r*0.25, r*0.15, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${c.brightness*0.5})`; ctx.fill();
    });
  }
}

// ─────────────────────────────────────────────
// Scene Manager
// ─────────────────────────────────────────────
let currentSceneIndex = 0;
let currentScene = null;
let isTransitioning = false;
let sceneDuration = 10000; // default 10 seconds
let sceneStartTime = 0;
let raf = null;
let lastTime = 0;
let infoVisible = true;
let infoTimer = null;

function buildDots() {
  dotsEl.innerHTML = '';
  SCENES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className='dot' + (i===0?' active':'');
    d.addEventListener('click',()=>goToScene(i));
    dotsEl.appendChild(d);
  });
}

function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active', i===currentSceneIndex);
  });
}

function showSceneInfo() {
  const s = SCENES[currentSceneIndex];
  sceneNameEl.textContent = s.name;
  sceneNameKrEl.textContent = s.nameKr;
  sceneInfoEl.style.opacity = '1';
  clearTimeout(infoTimer);
  infoTimer = setTimeout(()=>{
    sceneInfoEl.style.opacity = '0';
  }, 4000);
}

function createSceneInstance(index) {
  const safeIndex = ((index % SCENES.length) + SCENES.length) % SCENES.length;
  const SceneCtor = SCENES[safeIndex].SceneClass;
  const scene = new SceneCtor();
  if (typeof scene.init === 'function') scene.init();
  if (typeof scene.resize === 'function') scene.resize();
  return { scene, index: safeIndex };
}

function fallbackScene(index, error) {
  console.error('Scene load failed:', SCENES[index]?.name, error);
  const fallbackIndex = SCENES.findIndex(s => s.SceneClass === InfiniteStars);
  try {
    return createSceneInstance(fallbackIndex >= 0 ? fallbackIndex : 0);
  } catch (fallbackError) {
    console.error('Fallback scene load failed:', fallbackError);
    return { scene: new Scene(), index: 0 };
  }
}

function applyScene(index) {
  let created;
  try {
    created = createSceneInstance(index);
  } catch (error) {
    created = fallbackScene(index, error);
  }

  if (currentScene && typeof currentScene.destroy === 'function') {
    try { currentScene.destroy(); } catch (error) { console.error('Scene destroy failed:', error); }
  }

  currentSceneIndex = created.index;
  currentScene = created.scene;
  sceneStartTime = performance.now();
  updateDots();
  showSceneInfo();
}

function goToScene(index, dir=1) {
  if(isTransitioning) return;
  isTransitioning = true;

  fadeEl.style.transition = 'opacity 0.8s ease';
  fadeEl.style.opacity = '1';

  setTimeout(()=>{
    try {
      applyScene(index);
    } finally {
      fadeEl.style.transition = 'opacity 1.2s ease';
      fadeEl.style.opacity = '0';
      isTransitioning = false;
    }
  }, 800);
}

function nextScene() { goToScene(currentSceneIndex + 1); }
function prevScene() { goToScene(currentSceneIndex - 1); }

// ─────────────────────────────────────────────
// Main Loop
// ─────────────────────────────────────────────
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  // Timer bar
  const elapsed = ts - sceneStartTime;
  const progress = Math.min(elapsed / sceneDuration, 1);
  timerBar.style.width = (progress * 100) + '%';

  if(elapsed > sceneDuration && !isTransitioning) nextScene();

  if(currentScene) {
    try {
      if (typeof currentScene.update === 'function') currentScene.update(dt);
      if (typeof currentScene.draw === 'function') currentScene.draw();
      drawPostFX(ts);
    } catch (error) {
      console.error('Scene render failed:', SCENES[currentSceneIndex]?.name, error);
      if (!isTransitioning) {
        goToScene(currentSceneIndex + 1);
      }
    }
  }

  raf = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────
document.getElementById('controls').addEventListener('click', (e)=>{
  if (document.body.classList.contains('menu-open')) return;
  if (e.target.closest('#dots, #menu-button, #side-menu')) return;
  const clickX = typeof e.clientX === 'number' ? e.clientX : W * 0.5;
  if (clickX < W * 0.5) prevScene();
  else nextScene();
});

function toggleMenu(force) {
  const open = typeof force === 'boolean' ? force : !document.body.classList.contains('menu-open');
  document.body.classList.toggle('menu-open', open);
}

menuButton.addEventListener('click', (e) => {
  e.stopPropagation();
  toggleMenu();
});
menuBackdrop.addEventListener('click', () => toggleMenu(false));

durationButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    sceneDuration = Number(btn.dataset.duration);
    sceneStartTime = performance.now();
    durationButtons.forEach(b => b.classList.toggle('active', b === btn));
  });
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') toggleMenu(false);
  if(e.key==='ArrowRight'||e.key===' ') nextScene();
  if(e.key==='ArrowLeft') prevScene();
  if(e.key==='f'||e.key==='F') {
    if(!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// Hide hint after 5s
setTimeout(()=>{ hintEl.style.opacity='0'; }, 5000);

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
buildDots();
applyScene(0);

fadeEl.style.opacity = '1';
fadeEl.style.transition = 'none';
setTimeout(()=>{
  fadeEl.style.transition = 'opacity 2s ease';
  fadeEl.style.opacity = '0';
}, 100);

lastTime = performance.now();
raf = requestAnimationFrame(loop);
</script>
