<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우주멍 — Cosmic Drift</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }

  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }


  #canvas {
    cursor: default;
  }

  #overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #scene-info {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    width: min(92vw, 760px);
    padding: 14px 20px 18px;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(4, 7, 16, 0.18), rgba(4, 7, 16, 0.34));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 18px 44px rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.06);
    transition: opacity 1.5s ease;
  }

  #scene-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(15px, 2vw, 22px);
    letter-spacing: 0.24em;
    color: rgba(255,255,255,0.78);
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(255,255,255,0.12), 0 2px 12px rgba(0,0,0,0.45);
  }

  #scene-name-kr {
    font-family: 'Noto Serif KR', serif;
    font-weight: 400;
    font-size: clamp(12px, 1.55vw, 16px);
    line-height: 1.55;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 1px 10px rgba(0,0,0,0.7), 0 0 10px rgba(255,255,255,0.08);
    word-break: keep-all;
  }

  #dots {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 40;
    pointer-events: auto;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(8, 10, 20, 0.18);
    backdrop-filter: blur(10px);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.24);
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.35s ease;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255,255,255,0.08);
  }

  .dot:hover {
    transform: scale(1.25);
    background: rgba(255,255,255,0.55);
  }

  .dot.active {
    background: rgba(255,255,255,0.92);
    transform: scale(1.45);
    box-shadow: 0 0 18px rgba(255,255,255,0.35);
  }

  #controls {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 15;
    cursor: default;
  }

  #timer-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: rgba(255,255,255,0.15);
    z-index: 30;
    transition: none;
  }

  #hint {
    pointer-events: none;

    position: fixed;
    top: 30px;
    right: 30px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    z-index: 20;
    transition: opacity 3s ease;
  }



  #menu-button {
    position: fixed;
    top: 22px;
    left: 22px;
    width: 52px;
    height: 52px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(10, 12, 22, 0.5);
    backdrop-filter: blur(14px);
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
  }

  #menu-button:hover {
    transform: translateY(-1px);
    background: rgba(20, 24, 40, 0.72);
    border-color: rgba(255,255,255,0.24);
  }

  .burger-lines, .burger-lines::before, .burger-lines::after {
    content: '';
    display: block;
    width: 19px;
    height: 2px;
    border-radius: 4px;
    background: rgba(255,255,255,0.88);
    transition: transform 0.25s ease, opacity 0.25s ease;
  }

  .burger-lines { position: relative; }
  .burger-lines::before { position: absolute; top: -6px; }
  .burger-lines::after { position: absolute; top: 6px; }

  body.menu-open .burger-lines { background: transparent; }
  body.menu-open .burger-lines::before { transform: translateY(6px) rotate(45deg); }
  body.menu-open .burger-lines::after { transform: translateY(-6px) rotate(-45deg); }

  #side-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: min(340px, 86vw);
    height: 100vh;
    padding: 86px 20px 24px;
    background: linear-gradient(180deg, rgba(8,10,18,0.92), rgba(10,10,16,0.78));
    border-right: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(18px);
    z-index: 55;
    transform: translateX(-105%);
    transition: transform 0.32s ease;
    box-shadow: 16px 0 50px rgba(0,0,0,0.35);
  }

  body.menu-open #side-menu { transform: translateX(0); }

  #menu-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  body.menu-open #menu-backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .menu-section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    color: rgba(255,255,255,0.84);
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .menu-card {
    padding: 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .menu-card + .menu-card { margin-top: 14px; }

  .menu-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .duration-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .duration-btn {
    font-family: inherit;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.88);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .duration-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.22);
  }

  .duration-btn.active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.38);
    box-shadow: 0 0 22px rgba(255,255,255,0.08);
  }

  .menu-copy {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255,255,255,0.48);
  }

  #fade-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }


  @media (max-width: 900px) {
    #hint {
      top: 20px;
      right: 20px;
      font-size: 10px;
      letter-spacing: 0.16em;
    }

    #scene-info {
      width: min(94vw, 720px);
      bottom: 80px;
      padding: 12px 16px 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(4, 7, 16, 0.24), rgba(4, 7, 16, 0.44));
    }

    #scene-name {
      font-size: clamp(15px, 4.2vw, 21px);
      letter-spacing: 0.18em;
      margin-bottom: 6px;
    }

    #scene-name-kr {
      font-size: clamp(12px, 3.1vw, 15px);
      line-height: 1.5;
    }

    #dots {
      width: calc(100vw - 24px);
      max-width: 720px;
      overflow-x: auto;
      overflow-y: hidden;
      justify-content: flex-start;
      gap: 10px;
      padding: 10px 12px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-snap-type: x proximity;
    }

    #dots::-webkit-scrollbar { display: none; }

    .dot {
      flex: 0 0 auto;
      width: 9px;
      height: 9px;
      scroll-snap-align: center;
    }

    #side-menu {
      width: min(380px, 92vw);
      padding: 82px 18px 20px;
    }
  }

  @media (max-width: 640px) {
    body {
      touch-action: manipulation;
    }

    #menu-button {
      top: 14px;
      left: 14px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
    }

    .burger-lines, .burger-lines::before, .burger-lines::after {
      width: 17px;
    }

    #hint {
      top: 16px;
      right: 14px;
      max-width: 46vw;
      text-align: right;
      line-height: 1.35;
      font-size: 9px;
    }

    #scene-info {
      bottom: 74px;
      width: calc(100vw - 20px);
      padding: 12px 12px 14px;
      border-radius: 18px;
    }

    #scene-name {
      font-size: clamp(14px, 5vw, 18px);
      letter-spacing: 0.12em;
      margin-bottom: 5px;
    }

    #scene-name-kr {
      font-size: clamp(12px, 3.5vw, 14px);
      letter-spacing: 0.01em;
      line-height: 1.45;
    }

    #dots {
      left: 10px;
      right: 10px;
      bottom: 14px;
      width: auto;
      transform: none;
      border-radius: 16px;
      padding: 10px 12px;
      background: rgba(8, 10, 20, 0.3);
    }

    #timer-bar {
      height: 3px;
    }

    #side-menu {
      width: 100vw;
      max-width: 100vw;
      padding: 78px 14px 18px;
      border-right: none;
      box-shadow: none;
    }

    .menu-card {
      padding: 14px;
      border-radius: 16px;
    }

    .menu-label {
      font-size: 14px;
      letter-spacing: 0.12em;
    }

    .duration-buttons {
      gap: 8px;
    }

    .duration-btn {
      flex: 1 1 calc(33.333% - 6px);
      min-width: 84px;
      padding: 11px 10px;
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="fade-overlay"></div>
<button id="menu-button" aria-label="메뉴 열기"><span class="burger-lines"></span></button>
<div id="menu-backdrop"></div>
<aside id="side-menu">
  <div class="menu-section-title">설정</div>
  <div class="menu-card">
    <div class="menu-label">자동으로 다음 우주로 넘기기</div>
    <div class="duration-buttons">
      <button class="duration-btn active" data-duration="10000">10초</button>
      <button class="duration-btn" data-duration="30000">30초</button>
      <button class="duration-btn" data-duration="60000">1분</button>
    </div>
  </div>
  <div class="menu-card">
    <div class="menu-label">Cosmic Drift</div>
    <div class="menu-copy">하단 리스트를 클릭하면 원하는 우주 배경으로 바로 이동합니다. 자동 전환 시간도 여기서 바꿀 수 있습니다.</div>
  </div>
</aside>

<div id="scene-info">
  <div id="scene-name"></div>
  <div id="scene-name-kr"></div>
</div>

<div id="dots"></div>
<div id="timer-bar"></div>
<div id="hint">LEFT = PREV · RIGHT = NEXT</div>
<div id="controls"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const fadeEl = document.getElementById('fade-overlay');
const sceneNameEl = document.getElementById('scene-name');
const sceneNameKrEl = document.getElementById('scene-name-kr');
const dotsEl = document.getElementById('dots');
const timerBar = document.getElementById('timer-bar');
const hintEl = document.getElementById('hint');
const sceneInfoEl = document.getElementById('scene-info');
const menuButton = document.getElementById('menu-button');
const menuBackdrop = document.getElementById('menu-backdrop');
const durationButtons = document.querySelectorAll('.duration-btn');

let W, H, cx, cy, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  cx = W / 2; cy = H / 2;
}
resize();
window.addEventListener('resize', () => { resize(); if(currentScene) currentScene.resize(); });

// ─── Utility ───────────────────────────────────────────────
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b));
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const isMobileViewport = () => window.innerWidth <= 640;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function rgba(r,g,b,a) { return `rgba(${r},${g},${b},${a})`; }

function drawPostFX(ts) {
  const t = ts * 0.001;

  const vignette = ctx.createRadialGradient(cx, cy, Math.min(W, H) * 0.18, cx, cy, Math.max(W, H) * 0.72);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.34)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 18; i++) {
    const x = (i * 193.7 + t * 38) % W;
    const y = (i * 127.9 + t * 21) % H;
    const r = 1.2 + (i % 3);
    const g = ctx.createRadialGradient(x, y, 0, x, y, r * 18);
    g.addColorStop(0, 'rgba(255,255,255,0.035)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r * 18, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation = 'soft-light';
  for (let y = 0; y < H; y += 3) {
    const alpha = 0.015 + (((y * 13) % 9) / 900);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0, y, W, 1);
  }
  ctx.restore();
}

// ─── Scene Base ─────────────────────────────────────────────
class Scene {
  constructor() { this.t = 0; this.particles = []; }
  init() {}
  update(dt) { this.t += dt; }
  draw() {}
  resize() {}
  destroy() {}
}

// ═══════════════════════════════════════════════
// SCENE 01 — Crimson Nebula (Project Hail Mary)
// ═══════════════════════════════════════════════
class CrimsonNebula extends Scene {
  init() {
    this.orbs = [];
    this.dust = [];
    this.glows = [];
    for(let i = 0; i < 120; i++) {
      this.dust.push({
        x: rand(0,W), y: rand(0,H),
        vx: rand(-0.12,0.12), vy: rand(-0.12,0.12),
        r: rand(1,3), a: rand(0.3,0.9),
        phase: rand(0, Math.PI*2)
      });
    }
    for(let i = 0; i < 28; i++) {
      this.orbs.push({
        x: rand(0,W), y: rand(0,H),
        vx: rand(-0.4,0.4), vy: rand(-0.3,0.3),
        r: rand(8,40), a: rand(0.15,0.5),
        phase: rand(0,Math.PI*2), speed: rand(0.3,0.9)
      });
    }
    for(let i = 0; i < 6; i++) {
      this.glows.push({
        x: rand(W*0.1,W*0.9), y: rand(H*0.1,H*0.9),
        r: rand(80,200), a: rand(0.05,0.15)
      });
    }
    // Star field
    this.stars = Array.from({length:300}, () => ({
      x: rand(0,W), y: rand(0,H),
      r: rand(0.3,1.8), a: rand(0.2,1),
      phase: rand(0,Math.PI*2)
    }));
  }
  draw() {
    const t = this.t * 0.001;
    // BG gradient
    const bg = ctx.createRadialGradient(cx, cy*0.6, 0, cx, cy, Math.max(W,H)*0.85);
    bg.addColorStop(0, '#3d0000');
    bg.addColorStop(0.4, '#1a0000');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Static glow pools
    this.glows.forEach(g => {
      const gr = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
      gr.addColorStop(0, `rgba(220,40,20,${g.a})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.ellipse(g.x, g.y, g.r*1.5, g.r, Math.PI*0.15, 0, Math.PI*2);
      ctx.fill();
    });

    // Stars
    this.stars.forEach(s => {
      const flicker = 0.7 + 0.3*Math.sin(t*2 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,200,180,${s.a * flicker})`;
      ctx.fill();
    });

    // Floating orbs (jellyfish)
    this.orbs.forEach(o => {
      const pulse = 1 + 0.18*Math.sin(t*o.speed + o.phase);
      const rr = o.r * pulse;
      const gr = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,rr);
      const alpha = o.a * (0.8 + 0.2*Math.sin(t*o.speed*0.7 + o.phase));
      gr.addColorStop(0, `rgba(255,120,80,${alpha})`);
      gr.addColorStop(0.4, `rgba(200,30,10,${alpha*0.6})`);
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(o.x, o.y, rr, 0, Math.PI*2);
      ctx.fill();

      // Orb inner highlight
      const ig = ctx.createRadialGradient(o.x-rr*0.25, o.y-rr*0.25, 0, o.x,o.y,rr*0.5);
      ig.addColorStop(0, `rgba(255,200,160,${alpha*0.5})`);
      ig.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.arc(o.x, o.y, rr*0.5, 0, Math.PI*2);
      ctx.fill();

      // Move
      o.x += o.vx; o.y += o.vy;
      if(o.x < -o.r*2) o.x = W + o.r;
      if(o.x > W+o.r*2) o.x = -o.r;
      if(o.y < -o.r*2) o.y = H + o.r;
      if(o.y > H+o.r*2) o.y = -o.r;
    });

    // Crimson dust particles
    this.dust.forEach(d => {
      const flicker = 0.5 + 0.5*Math.sin(t*3 + d.phase);
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,160,80,${d.a * flicker})`;
      ctx.fill();
      d.x += d.vx; d.y += d.vy;
      if(d.x < 0) d.x = W; if(d.x > W) d.x = 0;
      if(d.y < 0) d.y = H; if(d.y > H) d.y = 0;
    });

    // Center glow (like the bright light source in Hail Mary)
    const cg = ctx.createRadialGradient(cx*0.7, cy*1.3, 0, cx*0.7, cy*1.3, H*0.5);
    cg.addColorStop(0, `rgba(255,80,30,${0.25 + 0.08*Math.sin(t*0.5)})`);
    cg.addColorStop(0.5, `rgba(180,20,0,0.08)`);
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 02 — Blue Ion Storm
// ═══════════════════════════════════════════════
class BlueIonStorm extends Scene {
  init() {
    this.particles = Array.from({length:400}, () => this.newParticle());
    this.trails = [];
    this.bolts = [];
    this.boltTimer = 0;
  }
  newParticle(y0) {
    return {
      x: rand(0,W), y: y0 ?? rand(0,H),
      vx: rand(-1.5,1.5), vy: rand(-0.5,1.2),
      life: rand(0,1), maxLife: rand(0.5,1),
      r: rand(1,3), hue: rand(180,230)
    };
  }
  draw() {
    const t = this.t * 0.001;

    // BG
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W,H));
    bg.addColorStop(0, '#000d1a');
    bg.addColorStop(0.6, '#000510');
    bg.addColorStop(1, '#000000');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Nebula wisps
    for(let i=0; i<3; i++) {
      const wx = cx + Math.sin(t*0.3+i*2.1)*W*0.25;
      const wy = cy + Math.cos(t*0.25+i*1.7)*H*0.2;
      const wg = ctx.createRadialGradient(wx,wy,0,wx,wy,H*0.4);
      wg.addColorStop(0, `rgba(30,100,200,0.06)`);
      wg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = wg;
      ctx.fillRect(0,0,W,H);
    }

    // Particles
    this.particles.forEach((p, i) => {
      p.life += 0.005;
      if(p.life > p.maxLife) this.particles[i] = this.newParticle();
      const progress = p.life / p.maxLife;
      const alpha = progress < 0.2 ? progress/0.2 : 1 - (progress-0.8)/0.2;
      const clampedAlpha = clamp(alpha, 0, 1) * 0.85;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},100%,75%,${clampedAlpha})`;
      ctx.fill();

      // Tiny trail
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*6, p.y - p.vy*6);
      ctx.strokeStyle = `hsla(${p.hue},100%,75%,${clampedAlpha*0.3})`;
      ctx.lineWidth = p.r * 0.7;
      ctx.stroke();

      p.x += p.vx; p.y += p.vy;
      p.vx += rand(-0.05,0.05); p.vy += rand(-0.02,0.02);
    });

    // Center energy core
    const core = ctx.createRadialGradient(cx,cy,0,cx,cy,120);
    core.addColorStop(0, `rgba(150,200,255,${0.3+0.1*Math.sin(t*2)})`);
    core.addColorStop(0.3, `rgba(50,100,255,0.1)`);
    core.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = core;
    ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 03 — Golden Galaxy Spiral
// ═══════════════════════════════════════════════
class GoldenSpiral extends Scene {
  init() {
    this.arms = 4;
    this.stars = [];
    this.dust = [];
    for(let a = 0; a < this.arms; a++) {
      for(let i = 0; i < 600; i++) {
        const t = i / 600;
        const angle = t * Math.PI * 6 + (a/this.arms)*Math.PI*2;
        const radius = t * Math.min(W,H) * 0.42 + rand(-15,15);
        const spread = t * 35 + 5;
        this.stars.push({
          angle, radius,
          ox: Math.cos(angle)*radius, oy: Math.sin(angle)*radius,
          spread: rand(-spread, spread),
          r: rand(0.5,3.5)*((1-t)*0.7+0.3),
          brightness: rand(0.4,1),
          hue: rand(35,65),
          sat: rand(60,100)
        });
      }
    }
    // Core glow
    this.coreStars = Array.from({length:200}, () => {
      const a = rand(0,Math.PI*2);
      const r = rand(0,60);
      return { x: Math.cos(a)*r, y: Math.sin(a)*r, r: rand(0.5,2), a: rand(0.5,1) };
    });
  }
  draw() {
    const t = this.t * 0.0002;

    ctx.fillStyle = '#04020a';
    ctx.fillRect(0,0,W,H);

    // Background stars
    if(!this._bgStars) {
      this._bgStars = Array.from({length:400}, () => ({
        x: rand(0,W), y: rand(0,H), r: rand(0.2,1), a: rand(0.1,0.4)
      }));
    }
    this._bgStars.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(200,180,120,${s.a})`; ctx.fill();
    });

    // Outer halo
    const halo = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.45);
    halo.addColorStop(0, 'rgba(255,200,80,0.04)');
    halo.addColorStop(0.5, 'rgba(180,120,30,0.03)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(0,0,W,H);

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t);

    // Galaxy arms
    this.stars.forEach(s => {
      const angle = s.angle + t;
      const x = Math.cos(angle)*s.radius + Math.sin(angle+Math.PI/2)*s.spread;
      const y = Math.sin(angle)*s.radius + Math.cos(angle+Math.PI/2)*s.spread*0.5;
      const dist = Math.sqrt(x*x+y*y);
      const fade = clamp(1 - dist/(Math.min(W,H)*0.45), 0, 1);
      ctx.beginPath();
      ctx.arc(x, y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${s.hue},${s.sat}%,85%,${s.brightness*fade})`;
      ctx.fill();
    });

    // Core
    const cg = ctx.createRadialGradient(0,0,0,0,0,80);
    cg.addColorStop(0, `rgba(255,240,180,${0.95+0.05*Math.sin(this.t*0.003)})`);
    cg.addColorStop(0.15, 'rgba(255,200,80,0.6)');
    cg.addColorStop(0.5, 'rgba(200,120,20,0.2)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.fillRect(-200,-200,400,400);

    this.coreStars.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,240,200,${s.a})`; ctx.fill();
    });

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// SCENE 04 — Aurora Borealis in Space
// ═══════════════════════════════════════════════
class AuroraSpace extends Scene {
  init() {
    this.curtains = Array.from({length:8}, (_, i) => ({
      x: (i / 7) * W * 1.4 - W * 0.2,
      phase: rand(0, Math.PI*2),
      speed: rand(0.2, 0.5),
      width: rand(80, 200),
      hue: rand(140, 180),
      sat: rand(70,100),
      amplitude: rand(60,150),
      freq: rand(1.5,3)
    }));
    this.stars = Array.from({length:300}, () => ({
      x: rand(0,W), y: rand(0,H*0.5),
      r: rand(0.3,1.5), a: rand(0.3,1), phase: rand(0,Math.PI*2)
    }));
  }
  draw() {
    const t = this.t * 0.001;

    // Deep space BG
    const bg = ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0, '#000a08');
    bg.addColorStop(0.5, '#000510');
    bg.addColorStop(1, '#000005');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // Stars
    this.stars.forEach(s => {
      const f = 0.7 + 0.3*Math.sin(t*2+s.phase);
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(200,240,255,${s.a*f})`; ctx.fill();
    });

    // Aurora curtains
    this.curtains.forEach(c => {
      const shimmer = 0.7 + 0.3*Math.sin(t*c.speed + c.phase);
      ctx.save();
      ctx.globalAlpha = 0.65 * shimmer;

      const grad = ctx.createLinearGradient(0, H*0.05, 0, H*0.75);
      grad.addColorStop(0, `hsla(${c.hue},${c.sat}%,65%,0)`);
      grad.addColorStop(0.2, `hsla(${c.hue},${c.sat}%,65%,0.5)`);
      grad.addColorStop(0.6, `hsla(${c.hue+20},${c.sat}%,55%,0.35)`);
      grad.addColorStop(1, `hsla(${c.hue-10},${c.sat}%,45%,0)`);

      ctx.beginPath();
      ctx.moveTo(c.x, H);
      for(let y = H; y >= H*0.05; y -= 4) {
        const progress = (H - y) / (H * 0.95);
        const wave = Math.sin(progress*c.freq*Math.PI + t*c.speed + c.phase) * c.amplitude * Math.sin(progress*Math.PI);
        const waveW = c.width * (0.5 + 0.5*Math.sin(progress*Math.PI));
        ctx.lineTo(c.x + wave + waveW, y);
      }
      for(let y = H*0.05; y <= H; y += 4) {
        const progress = (H - y) / (H * 0.95);
        const wave = Math.sin(progress*c.freq*Math.PI + t*c.speed + c.phase) * c.amplitude * Math.sin(progress*Math.PI);
        const waveW = c.width * (0.5 + 0.5*Math.sin(progress*Math.PI));
        ctx.lineTo(c.x + wave - waveW, y);
      }
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    });

    // Horizon glow
    const hg = ctx.createLinearGradient(0,H*0.6,0,H);
    hg.addColorStop(0,'rgba(0,40,30,0)');
    hg.addColorStop(1,'rgba(0,60,40,0.3)');
    ctx.fillStyle = hg;
    ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 05 — Supernova Ring
// ═══════════════════════════════════════════════
class SupernovaRing extends Scene {
  init() {
    this.rings = [{ r:0, maxR: Math.max(W,H)*0.8, speed:0.5, born:0 }];
    this.ejecta = Array.from({length:200}, () => {
      const a = rand(0,Math.PI*2);
      const speed = rand(0.3,2);
      return { angle:a, speed, r:0, size:rand(1,4), hue:rand(20,60) };
    });
    this.sparks = Array.from({length:300}, () => ({
      x: cx, y: cy,
      vx: rand(-3,3), vy: rand(-3,3),
      life:0, maxLife:rand(60,200),
      r:rand(1,3), hue:rand(0,60)
    }));
    this.pulse = 0;
  }
  draw() {
    const t = this.t * 0.001;
    this.pulse += 0.016;

    ctx.fillStyle = `rgba(0,0,0,${this.pulse < 0.5 ? 1 : 0.15})`;
    ctx.fillRect(0,0,W,H);

    if(this.pulse < 0.5) {
      // Flash
      const f = Math.sin(this.pulse * Math.PI);
      ctx.fillStyle = `rgba(255,220,150,${f * 0.9})`;
      ctx.fillRect(0,0,W,H);
    }

    // Background stars
    if(!this._bg) {
      this._bg = Array.from({length:500}, () => ({
        x:rand(0,W), y:rand(0,H), r:rand(0.2,1.2), a:rand(0.1,0.6)
      }));
    }
    this._bg.forEach(s => {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,220,180,${s.a})`; ctx.fill();
    });

    // Ejecta streams
    this.ejecta.forEach(e => {
      e.r += e.speed;
      const x = cx + Math.cos(e.angle)*e.r;
      const y = cy + Math.sin(e.angle)*e.r;
      const fade = clamp(1 - e.r/Math.max(W,H), 0, 1);
      ctx.beginPath(); ctx.arc(x,y,e.size*fade,0,Math.PI*2);
      ctx.fillStyle = `hsla(${e.hue},100%,80%,${fade*0.8})`; ctx.fill();
    });

    // Sparks
    this.sparks.forEach((s,i) => {
      s.life++;
      if(s.life > s.maxLife) {
        this.sparks[i] = {x:cx,y:cy,vx:rand(-4,4),vy:rand(-4,4),life:0,maxLife:rand(60,200),r:rand(1,3),hue:rand(0,60)};
        return;
      }
      const prog = s.life / s.maxLife;
      const alpha = prog < 0.15 ? prog/0.15 : 1 - prog;
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.99; s.vy *= 0.99;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(1-prog),0,Math.PI*2);
      ctx.fillStyle = `hsla(${s.hue},100%,80%,${alpha * 0.7})`; ctx.fill();
    });

    // Shock wave rings
    this.rings.forEach(ring => {
      ring.r += ring.speed * (1 + ring.r * 0.002);
      if(ring.r < ring.maxR) {
        const alpha = clamp(1 - ring.r/ring.maxR, 0, 1) * 0.6;
        ctx.beginPath();
        ctx.arc(cx, cy, ring.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(255,180,80,${alpha})`;
        ctx.lineWidth = clamp(4 - ring.r/100, 0.5, 4);
        ctx.stroke();
      }
    });

    // Core
    const size = Math.max(0, 80 - this.rings[0].r * 0.1);
    const cg = ctx.createRadialGradient(cx,cy,0,cx,cy,size);
    cg.addColorStop(0, `rgba(255,255,220,${0.9+0.1*Math.sin(t*10)})`);
    cg.addColorStop(0.3, 'rgba(255,180,60,0.4)');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg; ctx.fillRect(0,0,W,H);
  }
}

// ═══════════════════════════════════════════════
// SCENE 06 — Cosmic Web (Dark Matter)
// ═══════════════════════════════════════════════
class CosmicWeb extends Scene {
  init() {
    this.nodes = Array.from({length:50}, () => ({
      x: rand(W*0.05, W*0.95), y: rand(H*0.05, H*0.95),
      vx: rand(-0.15,0.15), vy: rand(-0.15,0.15),
      r: rand(2,8), brightness: rand(0.4,1),
      hue: rand(200,280)
    }));
    this.MAX_DIST = 220;
  }
  draw() {
    const t = this.t * 0.001;

    ctx.fillStyle = '#010008';
    ctx.fillRect(0,0,W,H);

    // Deep glow
    for(let i=0;i<3;i++){
      const gx = cx + Math.sin(t*0.2+i*2)*W*0.3;
      const gy = cy + Math.cos(t*0.15+i*2)*H*0.25;
      const gr = ctx.createRadialGradient(gx,gy,0,gx,gy,300);
      gr.addColorStop(0,`rgba(60,20,120,0.08)`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
    }

    // Filaments
    ctx.save();
    for(let i=0;i<this.nodes.length;i++){
      for(let j=i+1;j<this.nodes.length;j++){
        const a = this.nodes[i], b = this.nodes[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<this.MAX_DIST){
          const alpha=(1-d/this.MAX_DIST)*0.5;
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          const mx=(a.x+b.x)/2+Math.sin(t*0.3+i)*20;
          const my=(a.y+b.y)/2+Math.cos(t*0.3+j)*20;
          ctx.quadraticCurveTo(mx,my,b.x,b.y);
          const hue=lerp(a.hue,b.hue,0.5);
          ctx.strokeStyle=`hsla(${hue},80%,70%,${alpha})`;
          ctx.lineWidth=clamp((1-d/this.MAX_DIST)*2.5,0.2,2.5);
          ctx.stroke();
        }
      }
    }
    ctx.restore();

    // Nodes (galaxy clusters)
    this.nodes.forEach(n=>{
      const pulse = 1 + 0.15*Math.sin(t*2 + n.x);
      const gr=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*pulse*4);
      gr.addColorStop(0,`hsla(${n.hue},80%,90%,${n.brightness})`);
      gr.addColorStop(0.4,`hsla(${n.hue},70%,60%,${n.brightness*0.4})`);
      gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr;
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r*pulse*4,0,Math.PI*2);
      ctx.fill();

      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0||n.x>W) n.vx*=-1;
      if(n.y<0||n.y>H) n.vy*=-1;
    });
  }
}

// ═══════════════════════════════════════════════
// SCENE 07 — Black Hole Accretion
// ═══════════════════════════════════════════════
class BlackHole extends Scene {
  init() {
    this.particles = Array.from({length:500}, () => this.spawn());
    this.diskR = Math.min(W,H) * 0.38;
    this.eventR = Math.min(W,H) * 0.08;
    this.lensing = [];
  }
  spawn() {
    const angle = rand(0, Math.PI*2);
    const r = rand(this.eventR || 60, (this.diskR || 200) + rand(20,80));
    return {
      angle, r,
      speed: 0.3 + 80/r * 0.8,
      drift: rand(-0.5,0.5),
      size: rand(0.5,2.5),
      hue: rand(10,50),
      opacity: rand(0.5,1),
      z: rand(0.2,1)  // disk thickness
    };
  }
  draw() {
    const t = this.t * 0.001;

    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,W,H);

    // Background starfield
    if(!this._stars) this._stars = Array.from({length:400}, () => ({
      x:rand(0,W),y:rand(0,H),r:rand(0.2,1.2),a:rand(0.1,0.5),phase:rand(0,Math.PI*2)
    }));
    this._stars.forEach(s => {
      const f=0.8+0.2*Math.sin(t*2+s.phase);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${s.a*f})`;ctx.fill();
    });

    // Accretion disk outer glow
    const diskGlow = ctx.createRadialGradient(cx,cy,this.eventR,cx,cy,this.diskR*1.5);
    diskGlow.addColorStop(0,`rgba(255,100,20,${0.12+0.04*Math.sin(t)})`);
    diskGlow.addColorStop(0.5,`rgba(200,60,10,0.05)`);
    diskGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=diskGlow; ctx.fillRect(0,0,W,H);

    // Disk particles
    ctx.save();
    ctx.translate(cx,cy);

    this.particles.forEach((p,i) => {
      p.angle += p.speed * 0.016 + p.drift * 0.001;
      p.r -= 0.05 + 0.1*(this.diskR/p.r);
      if(p.r < this.eventR) this.particles[i] = this.spawn();

      const proximity = clamp(1 - (p.r - this.eventR)/(this.diskR*0.6), 0, 1);
      const hue = lerp(p.hue, 5, proximity);
      const brightness = lerp(60, 95, proximity);
      const sat = lerp(80, 100, proximity);

      const x = Math.cos(p.angle) * p.r;
      const y = Math.sin(p.angle) * p.r * 0.25; // disk flatten
      const z = p.z;

      ctx.save();
      ctx.globalAlpha = p.opacity * z * (0.7 + 0.3*proximity);
      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `hsl(${hue},${sat}%,${brightness}%)`;
      ctx.fill();
      ctx.restore();
    });

    // Jet (relativistic)
    for(let side of [-1,1]) {
      const jg = ctx.createLinearGradient(0,0,0,side*H*0.6);
      jg.addColorStop(0,`rgba(150,200,255,${0.4+0.1*Math.sin(t*3)})`);
      jg.addColorStop(0.3,`rgba(100,150,255,0.15)`);
      jg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.save();
      ctx.rotate(Math.PI*0.5);
      ctx.fillStyle=jg;
      const jw=15+5*Math.sin(t*2);
      ctx.beginPath();
      ctx.moveTo(-jw,0);
      ctx.bezierCurveTo(-jw*2,side*H*0.2, -jw*3, side*H*0.4, -jw*5, side*H*0.6);
      ctx.bezierCurveTo(jw*5,side*H*0.6, jw*3, side*H*0.4, jw*2, side*H*0.2);
      ctx.lineTo(jw,0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Event horizon (pure black)
    ctx.beginPath();
    ctx.arc(0,0,this.eventR,0,Math.PI*2);
    ctx.fillStyle='#000';ctx.fill();

    // Photon ring
    const photon=ctx.createRadialGradient(0,0,this.eventR*0.95,0,0,this.eventR*1.25);
    photon.addColorStop(0,`rgba(255,200,100,${0.6+0.2*Math.sin(t*5)})`);
    photon.addColorStop(0.5,`rgba(255,150,50,0.3)`);
    photon.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=photon;
    ctx.beginPath();ctx.arc(0,0,this.eventR*1.25,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════
// SCENE 08 — Bioluminescent Space Ocean
// ═══════════════════════════════════════════════
class BioLuminescent extends Scene {

      r: rand(80, 240),
      a: rand(0.03, 0.09),

    this.planktonFar = Array.from({length:420}, () => ({
      x: rand(0,W), y: rand(0,H),
      vx: rand(-0.08,0.08), vy: rand(-0.06,0.03),
      r: rand(0.4,1.5), phase: rand(0,Math.PI*2),
      a: rand(0.12,0.45), hue: rand(180,220)

    this.planktonNear = Array.from({length:220}, () => ({

      vx: rand(-0.18,0.18), vy: rand(-0.12,0.05),
      r: rand(1.2,3.2), phase: rand(0,Math.PI*2),
      a: rand(0.18,0.6), hue: rand(170,205)
    }));

      x: (i + 0.5) * (W / 5) + rand(-W*0.06, W*0.06),

      a: rand(0.015, 0.04),

    }));
